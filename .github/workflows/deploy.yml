name: Deploy er-table Extension Bundle

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH key
        run: |
          install -m 600 /dev/null ~/.ssh_key
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh_key

      - name: Trigger full deploy
        run: |
          for i in 1 2 3; do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              -i ~/.ssh_key \
              root@${{ secrets.VPS_HOST }} \
              /opt/sys/scripts/deploy.sh && exit 0
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh_key
